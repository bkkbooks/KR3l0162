body:
  text: 玄晏春秋衛倫以郎應會于京師過豫而論及於味倫稱魏故侍中劉子揚食餅知鹽生精味之至也豫曰昔師曠識勞薪易牙別淄子揚之妙㧕末乎倫曰晉師曠易牙古之精也魏之子揚今之妙子何間焉衛倫過豫論及於時味倫因命僕取糗進子曰麥也有杏李奈味十七年子長七尺四寸未通史書與從姑子梁柳等或編荊為楯執杖為矛分陳相刺有若習兵母數譴豫豫出得瓜果歸以進母母投諸地曰孝經稱日用三牲之善猶為不孝何孝者莫大于欣親今爾年近乎三十志不存教心不人道曾無惕少慰我心修身篤學爾自得之于我何有因對豫流涕豫心少感遂伏史書余家素貧窘晝則務作夜則甘疲寐及二時之務書卷生塵篋不解緘唯季冬裁得一旬學或蕪夜寐或戲獨否或對食忘餐或不覺日夕居家遊出之事吉凶略絶富陽男數以全生之道誨子方之好色號于為書帙
